# ~/.tmux.conf
# tmux configuration — Tokyo Night theme

# ============================================================================
# GENERAL
# ============================================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*256col*:Tc"

# Increase scrollback
set -g history-limit 100000

# Faster escape (for nvim)
set -sg escape-time 10

# Enable mouse
set -g mouse on

# Start window/pane indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Increase repeat time
set -g repeat-time 1000

# Focus events (for nvim autoread)
set -g focus-events on

# ============================================================================
# KEYBINDINGS
# ============================================================================
# Change prefix to Ctrl-a (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "󱘢  Config reloaded!"

# Split panes with | and - (keeping current path)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window with current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with H J K L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Copy mode (vi-style)
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ============================================================================
# STATUS BAR — Tokyo Night
# ============================================================================
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-justify left

# Left side: session name
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26]  "

# Right side: date, time, host
set -g status-right-length 100
set -g status-right "#[fg=#565f89,bg=#1a1b26]#[fg=#c0caf5,bg=#292e42] 󰃰 %Y-%m-%d #[fg=#c0caf5,bg=#292e42] 󰥔 %H:%M #[fg=#7aa2f7,bg=#292e42]#[fg=#1a1b26,bg=#7aa2f7,bold] 󰍹 #h "

# Window status
setw -g window-status-style "fg=#565f89,bg=#1a1b26"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#1a1b26,bg=#bb9af7,bold"
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, 󰊓 ,} "
setw -g window-status-activity-style "fg=#e0af68,bg=#1a1b26"

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages
set -g message-style "fg=#1a1b26,bg=#e0af68,bold"

# ============================================================================
# PLUGINS (via TPM — tmux plugin manager)
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'            # Better copy/paste
set -g @plugin 'tmux-plugins/tmux-resurrect'       # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'       # Auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator'    # Seamless nvim ↔ tmux nav

# Resurrect/continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep at the bottom!)
# Installed by bootstrap.sh to ~/.tmux/plugins/tpm
if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
