# ~/.config/starship.toml — Tokyo Night theme
# Docs: https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](bold #7aa2f7)\
$os\
$username\
[@](bold #7aa2f7)\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$golang\
$rust\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
[╰─](bold #7aa2f7)\
$character"""

add_newline = true
palette = "tokyonight"

[palettes.tokyonight]
bg          = "#1a1b26"
bg_highlight = "#292e42"
fg          = "#c0caf5"
fg_dim      = "#a9b1d6"
comment     = "#565f89"
red         = "#f7768e"
orange      = "#ff9e64"
yellow      = "#e0af68"
green       = "#9ece6a"
cyan        = "#7dcfff"
blue        = "#7aa2f7"
purple      = "#bb9af7"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold blue"

[os.symbols]
Arch      = ""
Debian    = ""
Linux     = ""
Macos     = ""
Ubuntu    = ""
Windows   = ""

[username]
show_always = false
format = "[$user]($style)"
style_user = "bold green"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold purple"

[directory]
format = "in [$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Projects"  = " "
"Code"      = " "

[git_branch]
format = "on [ $branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "bold blue"
only_with_files = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[line_break]
disabled = false
